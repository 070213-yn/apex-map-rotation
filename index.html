<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="APEX MAP ROTATION for SEASON29" />
<meta name="twitter:description" content="シーズン29のランクマップローテーションを現在時刻から1週間後まで自動表示。" />
<meta name="twitter:image" content="https://070213-yn.github.io/apex-map-rotation/og-image.png" />

<!-- ファビコン -->
<link rel="icon" type="image/png" href="favicon.png" id="favicon-link" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=s29e" />
</head>
<body>
  <!-- 背景パーティクル -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <!-- CRTスキャンライン -->
  <div class="scanlines" aria-hidden="true"></div>
  <!-- マップ切替時の画面フラッシュレイヤー -->
  <div class="screen-flash" id="screen-flash" aria-hidden="true"></div>

  <header class="site-header">
    <div class="brand">
      <span class="brand-mark"></span>
      <h1 class="glitch" data-text="APEX MAP ROTATION">APEX <span class="accent">MAP ROTATION</span> <span class="season">for SEASON29</span></h1>
    </div>
  </header>

  <main>
    <!-- 現在のマップ (HUDコーナー付き) -->
    <section class="current-card" id="current-card" aria-live="polite">
      <div class="current-image" id="current-image"></div>
      <div class="current-info">
        <span class="current-label">
          <span class="live-dot"></span>NOW PLAYING
        </span>
        <h2 class="current-name" id="current-name">読み込み中…</h2>
        <p class="current-time" id="current-time"></p>
        <div class="countdown-wrap">
          <span class="countdown-label">次のマップまで</span>
          <span class="countdown" id="countdown">--:--:--</span>
        </div>
        <div class="next-line">
          <span class="next-label">NEXT</span>
          <span class="next-name" id="next-name">--</span>
        </div>
        <div class="share-row">
          <button class="share-btn share-x" id="share-x" type="button" aria-label="Xでシェア">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M18.244 2H21l-6.55 7.49L22 22h-6.78l-4.78-6.26L4.94 22H2.18l7.01-8.02L2 2h6.94l4.32 5.71L18.24 2Zm-1.18 18.4h1.66L7.04 3.5H5.27L17.06 20.4Z"/></svg>
            <span>シェア</span>
          </button>
          <button class="share-btn share-copy" id="share-copy" type="button">URLをコピー</button>
        </div>
      </div>
      <!-- 進行度バー -->
      <div class="progress-bar" id="progress-bar"></div>
    </section>

    <!-- 次の各マップまで -->
    <section class="next-each" id="next-each"></section>

    <!-- フィルタ & 凡例 -->
    <section class="filter-bar">
      <span class="filter-label">マップで絞り込み:</span>
      <div class="legend" id="legend"></div>
      <button class="filter-reset" id="filter-reset" type="button">すべて表示</button>
    </section>

    <!-- 1週間スケジュール -->
    <section class="schedule" id="schedule"></section>

    <p class="note">
      ※4時間30分ごとに「Broken Moon → Kings Canyon → Olympus」の順でローテーション。<br />
      時刻は日本時間(JST)で表示。1分ごとに自動更新します。
    </p>
  </main>

  <footer>
    <p>非公式ツール / Map images © Respawn Entertainment &amp; EA</p>
  </footer>

  <script src="app.js?v=s29d"></script>
</body>
</html>
